name: Stocazzo Scanner

on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_PASSWORD }}
          ALERT_EMAIL:     ${{ secrets.ALERT_EMAIL }}
          FINNHUB_KEY:     ${{ secrets.FINNHUB_KEY }}
          TWELVEDATA_KEY:  ${{ secrets.TWELVEDATA_KEY }}
          GOVGREED_KEY:    ${{ secrets.GOVGREED_KEY }}
        run: python main.py

      - name: Prepare HTML for deploy
        run: |
          mkdir -p dist
          cp live.html dist/
          cp history.html dist/
          cp sources.html dist/
          cp index.html dist/
          # Keep-alive: update timestamp so GitHub doesn't pause scheduled workflows
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > dist/.last_run

      - name: Deploy HTML to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
